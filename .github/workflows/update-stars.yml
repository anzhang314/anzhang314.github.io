name: Update GitHub Stars

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:         # allow manual trigger

jobs:
  update-stars:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch star counts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, urllib.request, os

          repos = [
              ("stars-alphasteer",  "AlphaLab-USTC/AlphaSteer"),
              ("stars-alphaalign",  "zy20031230/AlphaAlign"),
              ("stars-alpharec",    "LehengTHU/AlphaRec"),
              ("stars-minionecrec", "AkaliKong/MiniOneRec"),
              ("stars-agent4rec",   "LehengTHU/Agent4Rec"),
              ("stars-memocr",      "meituan/MemOCR"),
              ("stars-riskybench",  "SophieZheng998/Risky-Bench"),
              ("stars-sdpo",        "chenyuxin1999/S-DPO"),
              ("stars-ldagent",     "leolee99/LD-Agent"),
              ("stars-selfverify",  "chenyuxin1999/Learning-to-Self-Verify"),
          ]

          token = os.environ.get("GH_TOKEN", "")
          result = {}
          for id_, repo in repos:
              url = f"https://api.github.com/repos/{repo}"
              headers = {"User-Agent": "star-updater"}
              if token:
                  headers["Authorization"] = f"Bearer {token}"
              try:
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req, timeout=10) as r:
                      data = json.loads(r.read())
                      result[id_] = data.get("stargazers_count", 0)
                      print(f"{repo}: {result[id_]}")
              except Exception as e:
                  print(f"Error {repo}: {e}")

          with open("stars.json", "w") as f:
              json.dump(result, f, indent=2)
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stars.json
          git diff --staged --quiet || git commit -m "chore: update GitHub star counts [skip ci]"
          git push
